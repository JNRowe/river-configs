name: Generate and deploy HTML

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.filter.outputs.build }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Check for file changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            build:
              - .github/workflows/build_HTML.yml
              - .images/**
              - conf.py
              - requirements.txt
              - "**.rst"

  build:
    name: Build HTML
    needs: changes
    if: needs.changes.outputs.build == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          version: 0.9.2
          activate-environment: true
          cache-dependency-glob: requirements.txt

      - name: Install dependencies
        run: uv sync --active --no-install-project

      - name: Build HTML with Sphinx
        run: |
          uv run sphinx-build --fail-on-warning --keep-going \
            --doctree-dir build/doctrees --builder html . _build/html
          # upload-pages-artifact@v4 doesn't include files beginning with a dot
          mv _build/html/{.,_}buildinfo

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _build/html

  deploy:
    name: Deploy to GitHub Pages
    permissions:
      pages: write
      id-token: write

    needs: build
    if: github.ref == 'refs/heads/main'
    # The deployment environment must be configured in repository settings
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
