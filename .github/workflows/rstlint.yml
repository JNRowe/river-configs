name: Lint reStructuredText files

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      lint: ${{ steps.filter.outputs.lint }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Check for file changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            lint:
              - .github/workflows/rstlint.yml
              - conf.py
              - requirements.txt
              - requirements-lint.txt
              - "**.rst"

  lint:
    name: Run Sphinx dummy build
    needs: changes
    if: needs.changes.outputs.lint == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          version: 0.9.2
          activate-environment: true
          cache-dependency-glob: |
            requirements.txt
            requirements-lint.txt

      - name: Install dependencies
        run: uv sync --active --no-install-project --group lint

      - name: Run linter
        run: |
          uv run rst-lint README.rst

      - name: Run Sphinx dummy build to check for errors
        run: |
          uv run sphinx-build --fail-on-warning --keep-going \
            --doctree-dir build/doctrees --builder dummy . _build/dummy
